<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>破局 - 历史切面中的抉择</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --ink: #2C2826;
    --ink-soft: #5A5248;
    --ink-lighter: #9A8E7E;
    --paper: #F4EFE6;
    --paper-warm: #EDE6D8;
    --paper-dark: #E5DCC8;
    --accent: #C03C28;
    --accent-warm: #B85450;
    --gold: #B8956A;
    --success: #4A7C59;
    --danger: #8B3A3A;
    --shadow: rgba(44, 40, 38, 0.08);
    --shadow-deep: rgba(44, 40, 38, 0.15);
    --card-height: calc(100vh - 40px);
    --card-max-width: 430px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--paper);
    color: var(--ink);
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== 页面容器 ===== */
  .app {
    width: 100%;
    height: 100vh;
    height: 100dvh;
    max-width: var(--card-max-width);
    margin: 0 auto;
    position: relative;
    overflow: hidden;
  }

  .page {
    display: none;
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
  }

  .page.active { display: flex; flex-direction: column; }

  /* ===== 标题页 ===== */
  .title-page {
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    background: linear-gradient(180deg, white 0%, var(--paper-warm) 100%);
    text-align: center;
    position: relative;
  }

  .title-page .stamp {
    position: absolute;
    top: 40px;
    right: 30px;
    width: 60px;
    height: 60px;
    border: 2px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif SC', serif;
    font-size: 28px;
    color: var(--accent);
    transform: rotate(-12deg);
    opacity: 0.7;
  }

  .game-title {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(56px, 15vw, 100px);
    font-weight: 900;
    color: var(--ink);
    letter-spacing: 0.15em;
    line-height: 1.1;
    margin-bottom: 12px;
  }

  .game-subtitle {
    font-size: clamp(14px, 3.5vw, 18px);
    color: var(--ink-soft);
    letter-spacing: 0.3em;
    margin-bottom: 32px;
    font-weight: 300;
  }

  .title-divider {
    width: 80px;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 0 auto 28px;
  }

  .game-intro {
    font-size: 14px;
    line-height: 1.8;
    color: var(--ink-lighter);
    max-width: 300px;
    margin: 0 auto 32px;
    text-align: left;
    padding: 16px;
    background: var(--paper);
    border-radius: 12px;
    border-left: 3px solid var(--accent);
  }

  .game-intro p { margin-bottom: 10px; }
  .game-intro p:last-child { margin-bottom: 0; }

  .btn-primary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 14px 40px;
    background: var(--ink);
    color: white;
    font-size: 16px;
    font-weight: 500;
    letter-spacing: 0.2em;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    width: 100%;
    max-width: 240px;
    touch-action: manipulation;
  }

  .btn-primary:active {
    background: var(--accent);
    transform: scale(0.98);
  }

  /* ===== 关卡选择 ===== */
  .levels-page {
    padding: 20px 16px;
    background: linear-gradient(180deg, white 0%, var(--paper-warm) 100%);
    overflow-y: auto;
  }

  .page-header {
    text-align: center;
    margin-bottom: 20px;
    padding-top: 16px;
  }

  .page-header h2 {
    font-family: 'Noto Serif SC', serif;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .page-header .hint {
    color: var(--ink-lighter);
    font-size: 12px;
  }

  .level-card {
    background: white;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 2px 12px var(--shadow);
    touch-action: manipulation;
  }

  .level-card:active {
    transform: scale(0.98);
    border-color: var(--gold);
  }

  .level-card .era {
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 6px;
    font-weight: 500;
  }

  .level-card .name {
    font-family: 'Noto Serif SC', serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
    color: var(--ink);
  }

  .level-card .desc {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .level-card .meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .level-card .tag {
    display: inline-block;
    padding: 4px 12px;
    background: var(--paper);
    border-radius: 20px;
    font-size: 12px;
    color: var(--ink-lighter);
  }

  /* ===== 卡片式游戏页面 ===== */
  .game-page {
    background: var(--paper);
    padding: 20px 16px;
    align-items: center;
    justify-content: center;
  }

  .game-card {
    width: 100%;
    max-height: calc(100vh - 40px);
    max-height: calc(100dvh - 40px);
    background: white;
    border-radius: 20px;
    box-shadow: 0 4px 24px var(--shadow-deep);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
    animation: cardIn 0.4s ease;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(20px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .game-card.slide-out {
    animation: cardOut 0.3s ease forwards;
  }

  @keyframes cardOut {
    from { opacity: 1; transform: translateX(0); }
    to { opacity: 0; transform: translateX(-100%); }
  }

  .card-header {
    padding: 20px 20px 12px;
    background: linear-gradient(180deg, var(--paper-warm) 0%, white 100%);
    border-bottom: 1px solid var(--paper-dark);
    flex-shrink: 0;
  }

  .card-era {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.15em;
    margin-bottom: 4px;
    font-weight: 500;
  }

  .card-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 18px;
    font-weight: 700;
    line-height: 1.3;
  }

  .card-progress {
    margin-top: 10px;
    height: 3px;
    background: var(--paper-dark);
    border-radius: 2px;
    overflow: hidden;
  }

  .card-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    transition: width 0.5s ease;
    border-radius: 2px;
  }

  .card-body {
    padding: 20px;
    font-size: 15px;
    line-height: 1.8;
    color: var(--ink-soft);
    overflow-y: auto;
    flex: 1;
    -webkit-overflow-scrolling: touch;
  }

  .card-body p {
    margin-bottom: 12px;
    text-indent: 2em;
  }

  .card-body p:last-child {
    margin-bottom: 0;
  }

  .card-body .highlight {
    color: var(--ink);
    font-weight: 600;
    background: linear-gradient(180deg, transparent 60%, rgba(192, 60, 40, 0.15) 60%);
    padding: 0 2px;
  }

  .card-body .dialogue {
    padding: 14px;
    background: var(--paper);
    border-radius: 12px;
    margin: 14px 0;
    border-left: 3px solid var(--gold);
    text-indent: 0;
  }

  .card-body .dialogue .speaker {
    font-weight: 700;
    color: var(--accent);
    display: block;
    margin-bottom: 4px;
    font-size: 13px;
  }

  .card-body .dialogue .content {
    font-style: italic;
    color: var(--ink-soft);
  }

  .card-choices {
    padding: 0 16px 16px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .choice-btn {
    display: block;
    width: 100%;
    padding: 16px 18px;
    background: white;
    border: 2px solid var(--paper-dark);
    border-radius: 14px;
    text-align: left;
    font-size: 14px;
    line-height: 1.5;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.2s ease;
    touch-action: manipulation;
    -webkit-appearance: none;
  }

  .choice-btn:active {
    border-color: var(--gold);
    background: var(--paper);
    transform: scale(0.98);
  }

  .choice-btn .choice-tag {
    display: inline-block;
    padding: 2px 8px;
    background: var(--accent);
    color: white;
    font-size: 11px;
    border-radius: 4px;
    margin-right: 8px;
    vertical-align: middle;
    font-weight: 500;
  }

  .choice-btn .choice-text {
    vertical-align: middle;
  }

  /* ===== 结果页 ===== */
  .result-page {
    padding: 20px 16px;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, white 0%, var(--paper-warm) 100%);
  }

  .result-card {
    width: 100%;
    max-height: calc(100vh - 40px);
    max-height: calc(100dvh - 40px);
    background: white;
    border-radius: 20px;
    box-shadow: 0 4px 24px var(--shadow-deep);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    animation: cardIn 0.4s ease;
  }

  .result-header {
    padding: 24px 20px;
    text-align: center;
    background: linear-gradient(180deg, var(--paper-warm) 0%, white 100%);
    border-bottom: 1px solid var(--paper-dark);
    flex-shrink: 0;
  }

  .result-icon {
    font-size: 48px;
    margin-bottom: 12px;
  }

  .result-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 24px;
    font-weight: 700;
  }

  .result-title.win { color: var(--success); }
  .result-title.lose { color: var(--danger); }
  .result-title.neutral { color: var(--gold); }

  .result-body {
    padding: 20px;
    overflow-y: auto;
    flex: 1;
    -webkit-overflow-scrolling: touch;
  }

  .result-text {
    font-size: 14px;
    line-height: 1.8;
    color: var(--ink-soft);
    text-align: left;
  }

  .result-text p {
    text-indent: 2em;
    margin-bottom: 10px;
  }

  .result-text p:last-child { margin-bottom: 0; }

  .history-note {
    padding: 14px 16px;
    background: var(--paper);
    border-radius: 12px;
    margin-top: 16px;
    text-align: left;
    border-left: 3px solid var(--gold);
  }

  .history-note h4 {
    font-family: 'Noto Serif SC', serif;
    font-size: 14px;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .history-note p {
    font-size: 12px;
    line-height: 1.6;
    color: var(--ink-lighter);
  }

  .result-actions {
    padding: 16px;
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  .btn-secondary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 12px 24px;
    background: white;
    color: var(--ink);
    font-size: 14px;
    border: 2px solid var(--paper-dark);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    touch-action: manipulation;
    -webkit-appearance: none;
  }

  .btn-secondary:active {
    border-color: var(--gold);
    background: var(--paper);
    transform: scale(0.98);
  }

  /* 返回按钮 */
  .back-btn {
    position: fixed;
    top: 12px;
    left: 12px;
    width: 36px;
    height: 36px;
    background: rgba(255,255,255,0.9);
    border: 1px solid var(--paper-dark);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    cursor: pointer;
    z-index: 1000;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    touch-action: manipulation;
  }

  /* 步骤指示器 */
  .step-indicator {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 6px;
    z-index: 100;
  }

  .step-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--paper-dark);
    transition: all 0.3s ease;
  }

  .step-dot.active {
    background: var(--accent);
    width: 20px;
    border-radius: 3px;
  }

  /* 防止 iOS 橡皮筋效果 */
  body {
    overscroll-behavior-y: none;
  }

  /* 滚动条美化 */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--paper-dark); border-radius: 2px; }
</style>
</head>
<body>

<div class="app">

  <!-- 标题页 -->
  <div class="page title-page active" id="titlePage">
    <div class="stamp">危</div>
    <div class="game-title">破局</div>
    <div class="game-subtitle">历史切面中的抉择</div>
    <div class="title-divider"></div>
    <div class="game-intro">
      <p>每一个时代都有困局中的人。</p>
      <p>你将被抛入历史的某一个切面，成为一位面临绝境的人物。</p>
      <p>这不是考验你的历史知识，而是考验你在绝境中的<strong>破局之力</strong>。</p>
    </div>
    <button class="btn-primary" onclick="showLevels()">进入历史</button>
  </div>

  <!-- 关卡选择 -->
  <div class="page levels-page" id="levelsPage">
    <div class="page-header">
      <h2>选择你的困局</h2>
      <p class="hint">每个故事约 5-10 分钟 · 失败可重来</p>
    </div>
    <div id="levelsList"></div>
  </div>

  <!-- 游戏页 -->
  <div class="page game-page" id="gamePage">
    <button class="back-btn" onclick="showLevels()">←</button>
    <div class="game-card" id="gameCard">
      <div class="card-header">
        <div class="card-era" id="cardEra"></div>
        <div class="card-title" id="cardTitle"></div>
        <div class="card-progress">
          <div class="card-progress-bar" id="cardProgressBar" style="width: 0%"></div>
        </div>
      </div>
      <div class="card-body" id="cardBody"></div>
      <div class="card-choices" id="cardChoices"></div>
    </div>
    <div class="step-indicator" id="stepIndicator"></div>
  </div>

  <!-- 结果页 -->
  <div class="page result-page" id="resultPage">
    <div class="result-card" id="resultCard">
      <div class="result-header">
        <div class="result-icon" id="resultIcon"></div>
        <div class="result-title" id="resultTitle"></div>
      </div>
      <div class="result-body">
        <div class="result-text" id="resultText"></div>
        <div class="history-note" id="historyNote" style="display: none;">
          <h4>📜 历史注脚</h4>
          <p id="historyNoteText"></p>
        </div>
      </div>
      <div class="result-actions">
        <button class="btn-primary" onclick="retryLevel()" style="max-width: 140px; padding: 12px 20px; font-size: 14px;">重新破局</button>
        <button class="btn-secondary" onclick="showLevels()">其他关卡</button>
      </div>
    </div>
  </div>

</div>

<script>
// ==================== 游戏数据 ====================
const levels = [
  {
    id: 'yuyi',
    era: '西晋 · 太康年间',
    name: '御医之刀',
    desc: '晋武帝派太医署御医给齐王诊病。你知道皇帝的心思，也知道说真话的后果。',
    tag: '被借刀杀人',
    scenes: [
      {
        id: 'start',
        text: `
          <p>你是太医署的一名普通御医，姓陈，在太医署当值已有十余年。医术平平，但胜在谨慎。</p>
          <p>今日，晋武帝司马炎突然召见。不是召见太医令，而是召见你——一个无名小卒。</p>
          <p class="dialogue"><span class="speaker">晋武帝</span><span class="content">"陈医工，齐王攸近日称病，你去看看。"</span></p>
          <p>皇帝的声音平静，但你感到一股寒意从脊背升起。</p>
          <p>齐王司马攸，皇帝的亲弟弟。如果不是礼法所限，皇位本可能是他的。如今声望日隆，朝中大臣多有附攸之意。</p>
          <p>你忽然明白了：皇帝为什么不派太医令程据去，而派你？</p>
          <p>因为程据是太医令，地位高，人脉广。而你——<span class="highlight">无名无势，用完即弃</span>。</p>
          <p>你就是这个局的刀。</p>
        `,
        choices: [
          { text: '领旨，先去齐王府诊病，如实禀报', next: 'honest', tag: 'A' },
          { text: '领旨，但先暗中打探皇帝真实意图', next: 'probe', tag: 'B' },
          { text: '叩首推辞，说臣医术浅薄', next: 'refuse', tag: 'C' }
        ]
      },
      {
        id: 'honest',
        text: `
          <p>你来到齐王府，为司马攸诊脉。齐王确实有病——肝郁气滞，情志不舒。</p>
          <p>你如实回禀："齐王确有疾，需静养。"</p>
          <p>皇帝面色不变："知道了，你退下吧。"</p>
          <p>三日后，皇帝下诏，命齐王攸离开洛阳，就国青州。齐王泣血上书，请求留京。皇帝不许。</p>
          <p>齐王被迫离京，途中呕血而亡。</p>
          <p>一个月后，你被廷尉府带走："陈医工，有人告你诊断有误，害死了齐王殿下。"</p>
        `,
        choices: [
          { text: '叩首认罪，请求宽恕', next: 'die_scapegoat', tag: 'A' },
          { text: '据理力争，出示真实脉案', next: 'die_evidence', tag: 'B' },
          { text: '沉默不语，等待发落', next: 'die_silent', tag: 'C' }
        ]
      },
      {
        id: 'probe',
        text: `
          <p>你领旨后，先去拜访太医令程据——你的上司。</p>
          <p>程据沉默良久："陈医工，你知道陛下为什么选你吗？因为你无名无势。陛下要的不是诊断，是一个说法。"</p>
          <p>"齐王必须离开洛阳，但不能是陛下逼走的——必须是'身体不好'，该回去养病。"</p>
          <p>你明白了。说"有病"，齐王被逼走，你是替罪羊。说"没病"，齐王被治欺君之罪。</p>
          <p>程据又说："但陛下也需要这个'说法'站得住脚。如果齐王死在路上，而天下人都知道他是被逼死的，陛下也要担责。"</p>
          <p class="dialogue"><span class="speaker">你</span><span class="content">"大人的意思是......"</span></p>
          <p>程据没有回答，只是看着你。</p>
        `,
        choices: [
          { text: '说：陛下需要齐王"该走"，但不能"死在路上"', next: 'fudge', tag: 'A' },
          { text: '问：那我该怎么办？请大人指点', next: 'ask_help', tag: 'B' },
          { text: '说：那我索性辞官归乡', next: 'resign', tag: 'C' }
        ]
      },
      {
        id: 'fudge',
        text: `
          <p>程据点头："你懂了。陛下要齐王离开，但不想担逼死亲弟的骂名。"</p>
          <p>"如果你只说'有病'，齐王被迫上路，死在途中，你就是害死齐王的庸医。"</p>
          <p>"如果你说'没病'，陛下会说齐王欺君。齐王还是死，你则是欺君之罪。"</p>
          <p>"所以，<span class="highlight">你不能给陛下任何一个明确的答案</span>。你要让齐王的病'复杂'到无法远行，但又'不确定'到不能说是装病。"</p>
          <p>程据最后说："我只能说到这里。接下来，是你自己的局。"</p>
        `,

// ==================== 状态管理 ====================
let currentLevel = null;
let currentScene = null;
let gameHistory = [];
let stepCount = 0;
let totalSteps = 0;

// ==================== 页面切换 ====================
function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
}

function showLevels() {
  showPage('levelsPage');
  renderLevels();
}

function renderLevels() {
  const container = document.getElementById('levelsList');
  container.innerHTML = levels.map(level => `
    <div class="level-card" onclick="startLevel('${level.id}')">
      <div class="era">${level.era}</div>
      <div class="name">${level.name}</div>
      <div class="desc">${level.desc}</div>
      <div class="meta">
        <span class="tag">${level.tag}</span>
      </div>
    </div>
  `).join('');
}

function startLevel(levelId) {
  currentLevel = levels.find(l => l.id === levelId);
  currentScene = currentLevel.scenes.find(s => s.id === 'start');
  gameHistory = [];
  stepCount = 1;
  totalSteps = estimateSteps(currentLevel);
  showPage('gamePage');
  renderCard();
}

function estimateSteps(level) {
  // 估算最大步数（用于进度条）
  let maxDepth = 0;
  function countDepth(sceneId, depth) {
    const scene = level.scenes.find(s => s.id === sceneId);
    if (!scene) return;
    if (scene.result) {
      maxDepth = Math.max(maxDepth, depth);
      return;
    }
    if (scene.choices) {
      scene.choices.forEach(c => countDepth(c.next, depth + 1));
    }
  }
  countDepth('start', 1);
  return maxDepth || 5;
}

function renderCard() {
  document.getElementById('cardEra').textContent = currentLevel.era;
  document.getElementById('cardTitle').textContent = currentLevel.name;

  const progress = Math.min((stepCount / totalSteps) * 100, 100);
  document.getElementById('cardProgressBar').style.width = progress + '%';

  document.getElementById('cardBody').innerHTML = currentScene.text;

  const choicesHtml = currentScene.choices ? currentScene.choices.map(choice => `
    <button class="choice-btn" onclick="makeChoice('${choice.next}')">
      <span class="choice-tag">${choice.tag}</span>
      <span class="choice-text">${choice.text}</span>
    </button>
  `).join('') : '';
  document.getElementById('cardChoices').innerHTML = choicesHtml;

  // 更新步骤指示器
  updateStepIndicator();
}

function updateStepIndicator() {
  const indicator = document.getElementById('stepIndicator');
  const dots = [];
  for (let i = 1; i <= totalSteps; i++) {
    dots.push(`<div class="step-dot ${i === stepCount ? 'active' : ''}"></div>`);
  }
  indicator.innerHTML = dots.join('');
}

function makeChoice(nextSceneId) {
  // 卡片滑出动画
  const card = document.getElementById('gameCard');
  card.classList.add('slide-out');

  setTimeout(() => {
    gameHistory.push({ scene: currentScene.id, choice: nextSceneId });
    currentScene = currentLevel.scenes.find(s => s.id === nextSceneId);
    stepCount++;

    if (currentScene.result) {
      showResult(currentScene.result);
    } else {
      card.classList.remove('slide-out');
      renderCard();
      // 重新触发动画
      card.style.animation = 'none';
      card.offsetHeight; // 触发重排
      card.style.animation = 'cardIn 0.4s ease';
    }
  }, 300);
}

function showResult(result) {
  showPage('resultPage');

  const results = {
    win: { icon: '🎯', title: '破局成功', class: 'win' },
    win_alt: { icon: '⚡', title: '破局成功 · 险胜', class: 'win' },
    neutral: { icon: '🌿', title: '苟全性命', class: 'neutral' },
    lose: { icon: '⚰️', title: '破局失败', class: 'lose' }
  };

  const r = results[result];
  document.getElementById('resultIcon').textContent = r.icon;
  const titleEl = document.getElementById('resultTitle');
  titleEl.textContent = r.title;
  titleEl.className = 'result-title ' + r.class;
  document.getElementById('resultText').innerHTML = currentScene.text;

  const noteEl = document.getElementById('historyNote');
  if (currentScene.historyNote) {
    noteEl.style.display = 'block';
    document.getElementById('historyNoteText').textContent = currentScene.historyNote;
  } else {
    noteEl.style.display = 'none';
  }
}

function retryLevel() {
  startLevel(currentLevel.id);
}

// 初始化
showPage('titlePage');
</script>
