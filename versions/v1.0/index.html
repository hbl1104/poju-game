<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>破局 - 历史切面中的抉择</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

  :root {
    --ink: #2C2826;
    --ink-soft: #5A5248;
    --ink-lighter: #9A8E7E;
    --paper: #F4EFE6;
    --paper-warm: #EDE6D8;
    --paper-dark: #E5DCC8;
    --accent: #C03C28;
    --accent-warm: #B85450;
    --gold: #B8956A;
    --success: #4A7C59;
    --danger: #8B3A3A;
    --shadow: rgba(44, 40, 38, 0.08);
    --shadow-deep: rgba(44, 40, 38, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .game-container {
    width: 100%;
    max-width: 720px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 8px 32px var(--shadow-deep), 0 2px 8px var(--shadow);
    overflow: hidden;
    position: relative;
  }

  /* 顶部装饰条 */
  .top-bar {
    height: 4px;
    background: linear-gradient(90deg, var(--accent) 0%, var(--gold) 50%, var(--accent) 100%);
  }

  /* 标题画面 */
  .title-screen {
    padding: 60px 40px;
    text-align: center;
    background: linear-gradient(180deg, white 0%, var(--paper-warm) 100%);
  }

  .game-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 72px;
    font-weight: 900;
    color: var(--ink);
    letter-spacing: 0.15em;
    margin-bottom: 16px;
    text-shadow: 2px 2px 4px var(--shadow);
  }

  .game-subtitle {
    font-size: 18px;
    color: var(--ink-soft);
    letter-spacing: 0.3em;
    margin-bottom: 48px;
  }

  .game-desc {
    font-size: 15px;
    line-height: 2;
    color: var(--ink-lighter);
    max-width: 480px;
    margin: 0 auto 48px;
    text-align: left;
    padding: 24px;
    background: var(--paper);
    border-radius: 8px;
    border-left: 3px solid var(--accent);
  }

  .start-btn {
    display: inline-block;
    padding: 16px 48px;
    background: var(--ink);
    color: white;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.2em;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .start-btn:hover {
    background: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px var(--shadow-deep);
  }

  /* 关卡选择 */
  .level-select {
    padding: 40px;
    display: none;
  }

  .level-select h2 {
    font-family: 'Noto Serif SC', serif;
    font-size: 28px;
    text-align: center;
    margin-bottom: 8px;
  }

  .level-select .hint {
    text-align: center;
    color: var(--ink-lighter);
    font-size: 14px;
    margin-bottom: 32px;
  }

  .levels-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }

  .level-card {
    padding: 24px;
    background: var(--paper);
    border-radius: 8px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
  }

  .level-card:hover {
    border-color: var(--gold);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px var(--shadow);
  }

  .level-card.locked {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .level-card .era {
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  .level-card .name {
    font-family: 'Noto Serif SC', serif;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .level-card .desc {
    font-size: 14px;
    color: var(--ink-soft);
    line-height: 1.6;
  }

  .level-card .tag {
    display: inline-block;
    padding: 4px 12px;
    background: white;
    border-radius: 4px;
    font-size: 12px;
    color: var(--ink-lighter);
    margin-top: 12px;
  }

  .level-card .status {
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 20px;
  }

  /* 游戏画面 */
  .game-screen {
    display: none;
    min-height: 600px;
  }

  .story-header {
    padding: 32px 40px 20px;
    background: linear-gradient(180deg, var(--paper-warm) 0%, white 100%);
    border-bottom: 1px solid var(--paper-dark);
  }

  .story-era {
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.15em;
    margin-bottom: 8px;
  }

  .story-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 26px;
    font-weight: 700;
  }

  .story-progress {
    margin-top: 12px;
    height: 3px;
    background: var(--paper-dark);
    border-radius: 2px;
    overflow: hidden;
  }

  .story-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--gold));
    transition: width 0.5s ease;
  }

  .story-body {
    padding: 32px 40px;
    font-size: 16px;
    line-height: 2;
    color: var(--ink-soft);
  }

  .story-body p {
    margin-bottom: 20px;
    text-indent: 2em;
  }

  .story-body .highlight {
    color: var(--ink);
    font-weight: 500;
  }

  .story-body .dialogue {
    padding: 16px 20px;
    background: var(--paper);
    border-radius: 8px;
    margin: 16px 0;
    font-style: italic;
    border-left: 3px solid var(--gold);
  }

  .story-body .dialogue .speaker {
    font-weight: 700;
    font-style: normal;
    color: var(--accent);
  }

  .choices {
    padding: 0 40px 40px;
  }

  .choice-btn {
    display: block;
    width: 100%;
    padding: 20px 24px;
    margin-bottom: 12px;
    background: white;
    border: 2px solid var(--paper-dark);
    border-radius: 8px;
    text-align: left;
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
  }

  .choice-btn:hover {
    border-color: var(--gold);
    background: var(--paper);
    transform: translateX(4px);
  }

  .choice-btn .choice-tag {
    display: inline-block;
    padding: 2px 8px;
    background: var(--accent);
    color: white;
    font-size: 12px;
    border-radius: 4px;
    margin-right: 8px;
    vertical-align: middle;
  }

  /* 结果画面 */
  .result-screen {
    display: none;
    padding: 60px 40px;
    text-align: center;
  }

  .result-icon {
    font-size: 64px;
    margin-bottom: 24px;
  }

  .result-title {
    font-family: 'Noto Serif SC', serif;
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 16px;
  }

  .result-text {
    font-size: 16px;
    line-height: 2;
    color: var(--ink-soft);
    max-width: 520px;
    margin: 0 auto 40px;
    text-align: left;
  }

  .result-text p {
    text-indent: 2em;
    margin-bottom: 16px;
  }

  .result-actions {
    display: flex;
    gap: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .action-btn {
    padding: 14px 32px;
    background: var(--ink);
    color: white;
    font-size: 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .action-btn:hover {
    background: var(--accent);
    transform: translateY(-2px);
  }

  .action-btn.secondary {
    background: white;
    color: var(--ink);
    border: 2px solid var(--paper-dark);
  }

  .action-btn.secondary:hover {
    border-color: var(--gold);
    background: var(--paper);
  }

  /* 历史注释 */
  .history-note {
    padding: 20px 40px 40px;
    background: var(--paper-warm);
    border-top: 1px solid var(--paper-dark);
  }

  .history-note h4 {
    font-family: 'Noto Serif SC', serif;
    font-size: 16px;
    color: var(--accent);
    margin-bottom: 12px;
  }

  .history-note p {
    font-size: 14px;
    line-height: 1.8;
    color: var(--ink-lighter);
  }

  /* 动画 */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fade-in {
    animation: fadeIn 0.6s ease forwards;
  }

  /* 响应式 */
  @media (max-width: 640px) {
    .game-title { font-size: 48px; }
    .story-body, .choices, .story-header { padding-left: 24px; padding-right: 24px; }
    .levels-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="game-container">
  <div class="top-bar"></div>

  <!-- 标题画面 -->
  <div class="title-screen" id="titleScreen">
    <div class="game-title">破局</div>
    <div class="game-subtitle">历史切面中的抉择</div>
    <div class="game-desc">
      每一个时代都有困局中的人。<br><br>
      你将被抛入历史的某一个切面，成为一位面临绝境的人物。
      信息不完整，时间不多，对手在暗处，每一步都可能万劫不复。<br><br>
      这不是考验你的历史知识，而是考验你在绝境中的<strong>破局之力</strong>。
    </div>
    <button class="start-btn" onclick="showLevelSelect()">进入历史</button>
  </div>

  <!-- 关卡选择 -->
  <div class="level-select" id="levelSelect">
    <h2>选择你的困局</h2>
    <p class="hint">每个故事约 5-10 分钟 · 失败可重来或选其他关卡</p>
    <div class="levels-grid" id="levelsGrid"></div>
  </div>

  <!-- 游戏画面 -->
  <div class="game-screen" id="gameScreen">
    <div class="story-header">
      <div class="story-era" id="storyEra"></div>
      <div class="story-title" id="storyTitle"></div>
      <div class="story-progress">
        <div class="story-progress-bar" id="progressBar" style="width: 0%"></div>
      </div>
    </div>
    <div class="story-body" id="storyBody"></div>
    <div class="choices" id="choices"></div>
    <div class="history-note" id="historyNote" style="display: none;">
      <h4>📜 历史注脚</h4>
      <p id="historyNoteText"></p>
    </div>
  </div>

  <!-- 结果画面 -->
  <div class="result-screen" id="resultScreen">
    <div class="result-icon" id="resultIcon"></div>
    <div class="result-title" id="resultTitle"></div>
    <div class="result-text" id="resultText"></div>
    <div class="result-actions">
      <button class="action-btn" onclick="retryLevel()">重新破局</button>
      <button class="action-btn secondary" onclick="showLevelSelect()">选择其他关卡</button>
    </div>
  </div>
</div>

<script>
// ==================== 游戏数据 ====================

const levels = [
  {
    id: 'yuyi',
    era: '西晋 · 太康年间',
    name: '御医之刀',
    desc: '晋武帝司马炎派太医署御医给齐王司马攸诊病。你知道皇帝的心思，也知道说真话的后果。',
    tag: '被借刀杀人',
    unlocked: true,
    completed: false,
    scenes: [
      {
        id: 'start',
        text: `
          <p>你是太医署的一名普通御医，姓陈，在太医署当值已有十余年。你医术平平，但胜在谨慎，从未出过差错。</p>
          <p>今日，晋武帝司马炎突然召见。不是召见太医令，而是召见你——一个无名小卒。</p>
          <p>"陈医工，齐王攸近日称病，你去看看。"皇帝的声音平静，但你感到一股寒意从脊背升起。</p>
          <p>齐王司马攸，皇帝的亲弟弟，文帝司马昭生前最喜爱的儿子。如果不是礼法所限，皇位本可能是他的。如今他声望日隆，皇帝近年身体不佳，朝中大臣多有附攸之意。</p>
          <p>你跪在地上，额头触地。你忽然明白了：皇帝为什么不派太医令程据去，而派你？</p>
          <p>因为程据是太医令，地位高，人脉广，皇帝未必能完全控制他的嘴。而你——无名无势，用完即弃，不会有人为你说话。</p>
          <p>你就是这个局的<span class="highlight">刀</span>。</p>
        `,
        choices: [
          { text: '领旨，先去齐王府诊病，如实禀报', next: 'honest', tag: 'A' },
          { text: '领旨，但先暗中打探皇帝真实意图', next: 'probe', tag: 'B' },
          { text: '叩首推辞，说臣医术浅薄，请陛下另择高明', next: 'refuse', tag: 'C' }
        ]
      },
      {
        id: 'honest',
        text: `
          <p>你来到齐王府，为司马攸诊脉。齐王确实有病——肝郁气滞，情志不舒，加之长期忧惧，身体亏虚。</p>
          <p>你如实回禀皇帝："齐王确有疾，需静养，不宜操劳。"</p>
          <p>皇帝听完，面色不变，只淡淡地说："知道了，你退下吧。"</p>
          <p>三日后，皇帝下诏，命齐王攸离开洛阳，就国青州。齐王泣血上书，请求留在京师侍奉太后。皇帝不许。</p>
          <p>齐王被迫离京，途中呕血而亡。朝野震动，大臣们议论纷纷。</p>
          <p>一个月后，你被召入宫中。不是皇帝召见，是廷尉府的人。</p>
          <p>"陈医工，有人告你诊断有误，延误病情，害死了齐王殿下。"</p>
        `,
        choices: [
          { text: '叩首认罪，请求宽恕', next: 'die_scapegoat', tag: 'A' },
          { text: '据理力争，出示齐王真实脉案', next: 'die_evidence', tag: 'B' },
          { text: '沉默不语，等待发落', next: 'die_silent', tag: 'C' }
        ]
      },
      {
        id: 'probe',
        text: `
          <p>你领旨后，没有直接去齐王府。你先去拜访了太医令程据——你的上司。</p>
          <p>程据听完你的叙述，沉默了很长时间。然后说："陈医工，你知道陛下为什么选你吗？"</p>
          <p>你摇头。</p>
          <p>"因为你无名无势。"程据的声音很轻，"陛下要的不是诊断，是一个说法。齐王必须离开洛阳，但不能是陛下逼走的——必须是齐王'身体不好'，该回去养病。"</p>
          <p>你明白了。说"有病"，齐王会被逼走，你会被当作害死齐王的替罪羊。说"没病"，齐王会被当作欺君，下场更惨。</p>
          <p>程据又说："但陛下也需要这个'说法'站得住脚。如果齐王真的在路上死了，而天下人都知道他是被逼死的，那陛下也要担责。"</p>
          <p>你忽然想到了什么："大人的意思是......"</p>
          <p>程据没有回答，只是看着你。</p>
        `,
        choices: [
          { text: '说：我明白了。陛下需要齐王"该走"，但不能"死在路上"', next: 'fudge', tag: 'A' },
          { text: '问：那我该怎么办？请大人指点', next: 'ask_help', tag: 'B' },
          { text: '说：那我索性辞官归乡，不趟这浑水', next: 'resign', tag: 'C' }
        ]
      },
      {
        id: 'fudge',
        text: `
          <p>程据点头："你懂了。陛下要齐王离开，但不想担逼死亲弟的骂名。所以你如果只说'有病'，齐王被迫上路，死在途中，你就是害死齐王的庸医。"</p>
          <p>"但如果你说'没病'，陛下会说齐王欺君，直接治罪。齐王还是死，你则是欺君之罪。"</p>
          <p>"所以，<span class="highlight">你不能给陛下任何一个明确的答案</span>。你要让齐王的病'复杂'到无法远行，但又'不确定'到不能说是装病。"</p>
          <p>你出了一身冷汗，但也看到了一线生机。</p>
          <p>程据最后说："我只能说到这里。接下来，是你自己的局。"</p>
        `,
        choices: [
          { text: '诊断齐王"风疾初起，宜静不宜动，更不宜远行"', next: 'breakthrough', tag: '破局' },
          { text: '诊断齐王"体虚，需调养百日"，争取时间', next: 'delay2', tag: 'B' },
          { text: '诊断齐王"情志郁结，需家人陪伴，不宜远离京师"', next: 'family_excuse', tag: 'C' }
        ]
      },
      {
        id: 'breakthrough',
        text: `
          <p>你入宫禀报："陛下，齐王殿下确有风疾之兆。此病最忌惊扰、劳顿与郁怒。若强行令其远行就国，舟车劳顿，病情必剧。臣恐......"</p>
          <p>你跪下，声音哽咽："臣恐齐王殿下不堪其苦。风疾之人，最宜静养，动则生变。"</p>
          <p>皇帝沉默良久。</p>
          <p>风疾——这是当时人对心脑血管疾病的统称。你暗示的是：齐王若受逼迫，可能会中风、猝死。如果齐王在就国途中"自然"死去，天下人都会知道是被逼死的。</p>
          <p>更重要的是，你给了皇帝一个台阶：不是齐王不想走，是病不允许他走。皇帝若强行逼迫，齐王死在路上的责任，就在皇帝自己了。</p>
          <p>最终，齐王留在了洛阳。虽然后来仍被迫离开，但至少不是由你亲手递刀。</p>
          <p>你没有被当作替罪羊。皇帝后来另寻他法对付齐王，但那个"说法"不是你给的。</p>
          <p>你活下来了。在这个局里，<span class="highlight">让皇帝的"说法"站不住脚，比给皇帝一个完美的"说法"更安全</span>。</p>
        `,
        result: 'win',
        historyNote: '历史上司马攸确实被司马炎逼迫离京，死于途中。太医署御医在这个事件中扮演了"工具"角色——皇帝需要一个医学上的借口来合理化自己的政治决定。这个破局思路的核心是：让皇帝的借口"失效"，而不是提供一个"更好"的借口。'
      },
      {
        id: 'delay2',
        text: `
          <p>皇帝听完你的诊断，冷笑一声："百日？朕等不了百日。"</p>
          <p>三日后，齐王被强令就国。你因"延误诊断"被下狱，齐王死于途中，你随后被赐死。</p>
          <p>你明白了：在权力游戏中，"拖延"不是策略，只是另一种形式的顺从。皇帝不需要你的专业判断，只需要你的配合。</p>
          <p>而且，你的"拖延"给了皇帝一个更好的罪名——不仅你是庸医，还是故意拖延、心怀不轨的庸医。</p>
        `,
        result: 'lose',
        historyNote: '拖延战术在强势君主面前往往无效。司马炎决心已下，任何试图延缓的行为都会被视为不合作，甚至会被解读为"别有用心"。'
      },
      {
        id: 'family_excuse',
        text: `
          <p>你说："齐王情志郁结，需家人陪伴，不宜远离京师。"</p>

// ==================== 游戏状态 ====================

let currentLevel = null;
let currentScene = null;
let gameHistory = [];

// ==================== 画面切换 ====================

function hideAllScreens() {
  document.getElementById('titleScreen').style.display = 'none';
  document.getElementById('levelSelect').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('resultScreen').style.display = 'none';
}

function showTitle() {
  hideAllScreens();
  document.getElementById('titleScreen').style.display = 'block';
}

function showLevelSelect() {
  hideAllScreens();
  document.getElementById('levelSelect').style.display = 'block';
  renderLevels();
}

function renderLevels() {
  const grid = document.getElementById('levelsGrid');
  grid.innerHTML = levels.map(level => `
    <div class="level-card ${level.unlocked ? '' : 'locked'}" onclick="${level.unlocked ? `startLevel('${level.id}')` : ''}">
      <div class="era">${level.era}</div>
      <div class="name">${level.name}</div>
      <div class="desc">${level.desc}</div>
      <span class="tag">${level.tag}</span>
      <div class="status">${level.completed ? '✅' : level.unlocked ? '◯' : '🔒'}</div>
    </div>
  `).join('');
}

function startLevel(levelId) {
  currentLevel = levels.find(l => l.id === levelId);
  currentScene = currentLevel.scenes.find(s => s.id === 'start');
  gameHistory = [];
  
  hideAllScreens();
  document.getElementById('gameScreen').style.display = 'block';
  
  renderScene();
}

function renderScene() {
  // 更新标题
  document.getElementById('storyEra').textContent = currentLevel.era;
  document.getElementById('storyTitle').textContent = currentLevel.name;
  
  // 计算进度
  const totalScenes = currentLevel.scenes.length;
  const currentIndex = currentLevel.scenes.indexOf(currentScene);
  const progress = ((currentIndex + 1) / totalScenes) * 100;
  document.getElementById('progressBar').style.width = progress + '%';
  
  // 渲染文本
  document.getElementById('storyBody').innerHTML = `
    <div class="fade-in">${currentScene.text}</div>
  `;
  
  // 渲染选项
  const choicesHtml = currentScene.choices.map(choice => `
    <button class="choice-btn fade-in" onclick="makeChoice('${choice.next}')">
      <span class="choice-tag">${choice.tag}</span>
      ${choice.text}
    </button>
  `).join('');
  document.getElementById('choices').innerHTML = choicesHtml;
  
  // 隐藏历史注脚
  document.getElementById('historyNote').style.display = 'none';
}

function makeChoice(nextSceneId) {
  gameHistory.push({
    scene: currentScene.id,
    choice: nextSceneId
  });
  
  currentScene = currentLevel.scenes.find(s => s.id === nextSceneId);
  
  if (currentScene.result) {
    showResult(currentScene.result);
  } else {
    renderScene();
  }
}

function showResult(result) {
  hideAllScreens();
  document.getElementById('resultScreen').style.display = 'block';
  
  const resultData = {
    win: {
      icon: '🎯',
      title: '破局成功',
      text: currentScene.text
    },
    win_alt: {
      icon: '⚡',
      title: '破局成功 · 险胜',
      text: currentScene.text
    },
    neutral: {
      icon: '🌿',
      title: '苟全性命',
      text: currentScene.text
    },
    lose: {
      icon: '⚰️',
      title: '破局失败',
      text: currentScene.text
    }
  };
  
  const r = resultData[result];
  document.getElementById('resultIcon').textContent = r.icon;
  document.getElementById('resultTitle').textContent = r.title;
  document.getElementById('resultText').innerHTML = `<div class="fade-in">${r.text}</div>`;
  
  // 显示历史注脚
  if (currentScene.historyNote) {
    document.getElementById('historyNote').style.display = 'block';
    document.getElementById('historyNoteText').textContent = currentScene.historyNote;
  }
  
  // 标记完成
  currentLevel.completed = true;
}

function retryLevel() {
  startLevel(currentLevel.id);
}

// 初始化
showTitle();
</script>
